<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KAAPI CSS</title>
  </head>
  <body class="kaapi-full-center">
    <div style="position: absolute; top: 20px; right: 20px">
      <button
        id="darkBtn"
        class="kaapi-bg-blue kaapi-dark-btn kaapi-text-white kaapi-p-2 kaapi-rounded-md kaapi-cursor-pointer"
      >
        🌙
      </button>
    </div>

    <div id="card" class="kaapi-card kaapi-text-center kaapi-transition">
      <img src="./pfp.png" class="kaapi-avatar kaapi-m-2" />

      <h1 class="kaapi-text-xl kaapi-font-bold kaapi-text-dark">Jaani</h1>

      <p class="kaapi-text-muted kaapi-text-dark kaapi-m-2">
        Full Stack Developer
      </p>

      <div class="kaapi-m-4">
        <h3 class="kaapi-font-bold">Skills</h3>
        <div class="kaapi-flex kaapi-gap-2 kaapi-justify-center kaapi-m-2">
          <span class="kaapi-tag">HTML</span>
          <span class="kaapi-tag">CSS</span>
          <span class="kaapi-tag">JavaScript</span>
        </div>
      </div>

      <div class="kaapi-m-4">
        <h3 class="kaapi-font-bold">Hobbies</h3>
        <div class="kaapi-flex kaapi-gap-2 kaapi-justify-center kaapi-m-2">
          <span class="kaapi-tag">Coding</span>
          <span class="kaapi-tag">Reading</span>
          <span class="kaapi-tag">Travelling</span>
        </div>
      </div>
      <p class="kaapi-text green kaapi-m-2"> 🟢 Available for work </p>
      <!-- 🚀 Button -->
      <button
        id="connectBtn"
        class="kaapi-bg-blue kaapi-dark-btn kaapi-text-white kaapi-bg-blue kaapi-text-white kaapi-p-2 kaapi-rounded-md kaapi-cursor-pointer kaapi-transition"
      >
        Connect
      </button>
    </div>
    <script src="./kaapi.js"></script>
  </body>
</html>
